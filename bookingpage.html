<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie Booking System</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            background: url('cinemabg.jpg');
            background-position: center center;
            background-repeat: no-repeat;
            background-size: max(1400px, 100vw);
            color: white;
            font-family: "Montserrat", sans-serif;
        }

        form {
            padding: 20px;
            width: 300px;
            height: 61vh;
            width: 75vw;
            position: relative;
            z-index: 11;
            display: flex;
            justify-content: flex-end;
            align-items: center;
            flex-direction: column;
            gap: 15px;
            padding-top: 0px;
        }

        .cinema {
            margin-top: 48px;
            height: 85vh;
            width: 65vw;
            border-radius: 10px;
            border: 2px solid rgb(117, 5, 5);
            background-color: rgba(0, 0, 0, 0.598);
            position: relative;
            z-index: 11;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            box-shadow: 2px 2px 10px red, -2px -2px 10px red, -2px -2px 10px red, -2px -2px 10px red;
        }

        #cursor {
            height: 15px;
            width: 15px;
            background-color: red;
            border-radius: 50%;
            position: fixed;
            z-index: 99;
            transition: all linear 0.13s;
        }

        #cursor-blur {
            height: 400px;
            width: 400px;
            background-color: #cf1e1e57;
            border-radius: 50%;
            position: fixed;
            filter: blur(70px);
            z-index: 9;
            transition: all linear 0.4s;
        }

        body::-webkit-scrollbar {
            background-color: rgb(46, 0, 0);
            display: block;
            width: 10px;
        }

        body::-webkit-scrollbar-thumb {
            border-radius: 50px;
            background: linear-gradient(red, rgb(84, 8, 8));
        }

        *::selection {
            color: red;
            background-color: white;
        }

        .logo {
            height: 130px;
            width: 160px;
            margin-left: 30px;
            margin-top: 20px;
            transition: all ease-in-out 0.4s;
            position: relative;
            z-index: 11;
        }
        .logo:hover{
            filter: drop-shadow(0px 7px 20px red);
        }
        .showinghead {
            font-size: 2.8rem;
            margin: 0;
            font-weight: 900;
            text-shadow:
                0 0 10px red,
                0 0 20px red,
                0 0 40px red,
                0 0 80px red;
        }

        .showheadline {
            bottom: 0;
            width: 100%;
            height: 4px;
            background-color: red;
        }

        .showheadcont {
            position: relative;
            z-index: 11;
            width: 715px;
            margin: auto;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            margin: auto;
        }

        .navbtn {
            height: 45px;
            width: 150px;
            border-radius: 50px;
            color: white;
            border: 3px solid rgb(100, 0, 0);
            font-size: 1.1rem;
            background: linear-gradient(to left bottom, red, rgb(84, 8, 8));
            transition: all ease-in-out 0.3s;
            position: relative;
            z-index: 11;
            font-family: "Montserrat", sans-serif;
        }

        .navbtn:hover {
            font-size: 1rem;
            background: linear-gradient(to left bottom, rgb(84, 8, 8), red);
            cursor: pointer;
        }
 input, select {
  margin: 5px 0;
  padding: 10px;
  outline: none;
    border: 3px solid red;
    background-color: rgba(195, 21, 21, 0.455);
    color: white;
    font-size: 0.93rem;
    margin-left: 10px;
    border-radius: 10px;
        }
        input{
            width: 200px;
        }
        select{
            width: 225px;
        }
        .conto {
            display: flex;
            flex-direction: column;
        }
        h3{
            font-weight: 500;
            margin: 0;
            margin-left: 15px;
        }
        .conto1{
            margin-top: 0px;
        }
        .conto1, .conto2{
            display: flex;
            gap: 20px;
            margin-top: 15px;
        }
    </style>
</head>

<body>
    <div id="cursor"></div>
    <div id="cursor-blur"></div>
    <div class="cinema">
        <img class="logo ancr" src="logo-dark.png" alt="">
        <form id="bookingForm">
            <div class="showheadcont">
                <h1 class="showinghead">GET READY FOR THE SHOW!</h1>
                <div class="showheadline"></div>
            </div>
            <div class="conto1">
            <div class="conto">
                <h3>Select Movie : </h3>
                <select id="movie" required>
                    <option value="">--Choose a Movie--</option>
                </select>
            </div>
            <div class="conto">
                <h3>Select Branch : </h3>
                <select id="branch" required>
                    <option value="">--Choose a Branch--</option>
                </select>
            </div>

            <div class="conto">
                <h3>Select Date : </h3>
                <select id="date" required>
                    <option value="">--Choose a Date--</option>
                </select>
            </div>
        </div>
        <div class="conto2">
            <div class="conto">
                <h3>Select Time : </h3>
                <select id="time" required>
                    <option value="">--Choose a Time--</option>
                </select>
            </div>
            <div class="conto">
                <h3>Number of Tickets : </h3>
                <input type="number" id="tickets" min="1" placeholder="Enter number of tickets" required>
            </div>
            <div class="conto">
                <h3>Available Seats : </h3>
                <input type="number" id="availableSeats" readonly>
            </div>
        </div>

            <button class="navbtn" type="submit" style="width: 300px;">Confirm & Proceed to Payment</button>
            <button class="navbtn" onclick="location.href='userinfo.html'">Back</button>
        </form>
    </div>
    <script>
        var crsr = document.querySelector("#cursor");
        var crsrblr = document.querySelector("#cursor-blur");
        document.addEventListener("mousemove", (dets) => {
            crsr.style.left = dets.x + 3 + "px";
            crsr.style.top = dets.y + 7 + "px";
            crsrblr.style.left = dets.x - 200 + "px";
            crsrblr.style.top = dets.y - 200 + "px";
        });
        class BookingSystem {
            constructor() {
                const adminData = JSON.parse(localStorage.getItem("movies"));
                console.log("Admin Data:", adminData); // Log the data to ensure it's being retrieved

                if (!adminData || !adminData.length) {
                    alert("No movie data found. Please make sure admin has added movies.");
                    return;
                }

                this.movies = adminData;
            }

            // Populate movie options in the dropdown
            populateMovies() {
                const movieDropdown = document.getElementById("movie");
                this.movies.forEach(movie => {
                    const option = document.createElement("option");
                    option.value = movie.title;
                    option.textContent = movie.title;
                    movieDropdown.appendChild(option);
                });
            }

            // Populate branch options based on selected movie
            populateBranches(movieName) {
                const branchDropdown = document.getElementById("branch");
                branchDropdown.innerHTML = '<option value="">--Choose a Branch--</option>';
                const selectedMovie = this.movies.find(movie => movie.title === movieName);

                if (selectedMovie) {
                    Object.keys(selectedMovie.branches).forEach(branchName => {
                        const option = document.createElement("option");
                        option.value = branchName;
                        option.textContent = branchName;
                        branchDropdown.appendChild(option);
                    });
                }
            }

            // Populate date options based on selected movie and branch
            populateDates(movieName, branchName) {
                const dateDropdown = document.getElementById("date");
                dateDropdown.innerHTML = '<option value="">--Choose a Date--</option>';
                const selectedMovie = this.movies.find(movie => movie.title === movieName);
                const selectedBranch = selectedMovie?.branches[branchName];

                if (selectedBranch) {
                    selectedMovie.dates.forEach(date => {
                        const option = document.createElement("option");
                        option.value = date;
                        option.textContent = date;
                        dateDropdown.appendChild(option);
                    });
                }
            }

            // Populate time options based on selected movie, branch, and date
            populateTimes(movieName, branchName, date) {
                const timeDropdown = document.getElementById("time");
                timeDropdown.innerHTML = '<option value="">--Choose a Time--</option>';
                const selectedMovie = this.movies.find(movie => movie.title === movieName);
                const selectedBranch = selectedMovie?.branches[branchName];

                if (selectedBranch && selectedMovie.dates.includes(date)) {
                    selectedMovie.times.forEach(time => {
                        const option = document.createElement("option");
                        option.value = time;
                        option.textContent = time;
                        timeDropdown.appendChild(option);
                    });
                }
            }

            // Update available seats based on selected movie, branch, and date
            // This method will update available seats when a branch and date are selected
            updateAvailableSeats(movieName, branchName) {
                const availableSeatsField = document.getElementById("availableSeats");
                const selectedMovie = this.movies.find(movie => movie.title === movieName);
                const selectedBranchSeats = selectedMovie?.branches[branchName];

                if (selectedBranchSeats) {
                    availableSeatsField.value = selectedBranchSeats;  // Directly show available seats from the branch
                }
            }

            confirmBooking(event) {
                event.preventDefault();
                const movieName = document.getElementById("movie").value;
                const branchName = document.getElementById("branch").value;
                const date = document.getElementById("date").value;
                const time = document.getElementById("time").value;
                const tickets = parseInt(document.getElementById("tickets").value, 10);

                const selectedMovie = this.movies.find(movie => movie.title === movieName);
                const selectedBranch = selectedMovie?.branches[branchName];

                // Check if the selected branch exists and enough seats are available
                if (selectedBranch && selectedBranch >= tickets) {
                    // Decrease the available seats for that branch
                    selectedMovie.branches[branchName] -= tickets;

                    // Save updated movie data back to localStorage
                    localStorage.setItem("movies", JSON.stringify(this.movies));

                    // Save booking data to localStorage for user
                    const bookingData = JSON.parse(localStorage.getItem("userBooking")) || [];
                    bookingData.push({
                        movie: movieName,
                        branch: branchName,
                        date: date,
                        time: time,
                        tickets: tickets
                    });
                    localStorage.setItem("userBooking", JSON.stringify(bookingData));

                    // Reset form and update available seats
                    document.getElementById("bookingForm").reset();
                    document.getElementById("availableSeats").value = selectedMovie.branches[branchName];  // Show updated available seats
                    setTimeout(()=>{
                        window.location.href='pay.html';
                    },2000)
                } else {
                    alert("Not enough seats available.");
                }
            }



            // Initialize event listeners
            init() {
                const form = document.getElementById("bookingForm");
                const movieDropdown = document.getElementById("movie");
                const branchDropdown = document.getElementById("branch");
                const dateDropdown = document.getElementById("date");

                form.addEventListener("submit", this.confirmBooking.bind(this));
                movieDropdown.addEventListener("change", (e) => {
                    this.populateBranches(e.target.value);
                    document.getElementById("branch").disabled = false;  // Enable branch dropdown
                    document.getElementById("date").disabled = true;  // Disable date dropdown
                    document.getElementById("time").disabled = true;  // Disable time dropdown
                    document.getElementById("availableSeats").value = "";  // Reset available seats
                });
                branchDropdown.addEventListener("change", (e) => {
                    const movieName = document.getElementById("movie").value;
                    this.populateDates(movieName, e.target.value);
                    document.getElementById("date").disabled = false;  // Enable date dropdown
                    document.getElementById("time").disabled = true;  // Disable time dropdown
                    document.getElementById("availableSeats").value = "";  // Reset available seats
                });
                dateDropdown.addEventListener("change", (e) => {
                    const movieName = document.getElementById("movie").value;
                    const branchName = document.getElementById("branch").value;
                    this.populateTimes(movieName, branchName, e.target.value);
                    this.updateAvailableSeats(movieName, branchName, e.target.value);
                    document.getElementById("time").disabled = false;  // Enable time dropdown
                });

                this.populateMovies();
            }
        }

        const bookingSystem = new BookingSystem();
        if (bookingSystem.movies) {
            bookingSystem.init();
        }
    </script>
</body>

</html>
