<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Info</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            background: url('cinemabg.jpg');
            background-position: center center;
            background-repeat: no-repeat;
            background-size: max(1400px, 100vw);
            color: white;
            font-family: "Montserrat", sans-serif;
        }

        form {
            padding: 20px;
            width: 300px;
            height: 56vh;
            width: 62vw;
            position: relative;
            z-index: 11;
            display: flex;
            justify-content: flex-end;
            align-items: center;
            flex-direction: column;
            gap: 15px;
        }

        .cinema {
            height: 87vh;
            width: 70vw;
            border-radius: 10px;
            border: 2px solid rgb(117, 5, 5);
            background-color: rgba(0, 0, 0, 0.598);
            position: relative;
            z-index: 11;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            box-shadow: 2px 2px 10px red, -2px -2px 10px red, -2px -2px 10px red, -2px -2px 10px red;
        }

        #cursor {
            height: 15px;
            width: 15px;
            background-color: red;
            border-radius: 50%;
            position: fixed;
            z-index: 99;
            transition: all linear 0.13s;
        }

        #cursor-blur {
            height: 400px;
            width: 400px;
            background-color: #cf1e1e57;
            border-radius: 50%;
            position: fixed;
            filter: blur(70px);
            z-index: 9;
            transition: all linear 0.4s;
        }

        body::-webkit-scrollbar {
            background-color: rgb(46, 0, 0);
            display: block;
            width: 10px;
        }

        body::-webkit-scrollbar-thumb {
            border-radius: 50px;
            background: linear-gradient(red, rgb(84, 8, 8));
        }

        *::selection {
            color: red;
            background-color: white;
        }

        .logo {
            height: 130px;
            width: 160px;
            margin-left: 30px;
            margin-top: 20px;
            transition: all ease-in-out 0.4s;
            position: relative;
            z-index: 11;
        }
        .logo:hover{
            cursor: pointer;
            filter: drop-shadow(0px 7px 20px red);
        }
        .showinghead {
            font-size: 2.8rem;
            margin: 0;
            font-weight: 900;
            text-shadow:
                0 0 10px red,
                0 0 20px red,
                0 0 40px red,
                0 0 80px red;
        }

        .showheadline {
            bottom: 0;
            width: 100%;
            height: 4px;
            background-color: red;
        }

        .showheadcont {
            position: relative;
            z-index: 11;
            width: 955px;
            margin: auto;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            margin: auto;
        }

        .navbtn {
            height: 45px;
            width: 150px;
            border-radius: 50px;
            color: white;
            border: 3px solid rgb(100, 0, 0);
            font-size: 1.1rem;
            background: linear-gradient(to left bottom, red, rgb(84, 8, 8));
            transition: all ease-in-out 0.3s;
            position: relative;
            z-index: 11;
            font-family: "Montserrat", sans-serif;
        }

        .navbtn:hover {
            font-size: 1rem;
            background: linear-gradient(to left bottom, rgb(84, 8, 8), red);
            cursor: pointer;
        }

        .shiph2 {
            text-align: center;
            position: relative;
            z-index: 11;
        }
 input {
    display: block;
  margin: 5px 0;
  padding: 10px;
  outline: none;
    border: 3px solid red;
    background-color: rgba(195, 21, 21, 0.455);
    color: white;
    font-size: 0.93rem;
    margin-left: 20px;
    border-radius: 10px;
        }
        .number i {
            margin-left: 12px;
        }
        .conto {
            display: flex;
        }
        h3{
            font-weight: 500;
        }
        #emailship{
            margin-right: 42px;
        }
        #phoneship{
            margin-right: 56px;
        }
        #cityship{
            margin-right: -53px;
        }
    </style>
</head>

<body>
    <div id="cursor"></div>
    <div id="cursor-blur"></div>
    <div class="cinema">
        <img onclick="location.href='mainpage.html'" class="logo ancr" src="logo-dark.png" alt="">
        <form id="data">
            <div class="showheadcont">
                <h1 class="showinghead">FILL OUT YOUR INFO TO BOOK TICKETS</h1>
                <div class="showheadline"></div>
            </div>
            <div class="conto">
                <h3 class="h3fullname">Full Name :</h3>
                <input type="text" id="fullnameship" required>
            </div>
            <div class="conto">
                <h3 class="h3email">Email Address :</h3>
                <input type="email" id="emailship" required>
            </div>
            <div class="conto">
                <h3 class="h3phone">Mobile Number :</h3>
                <i class="fa-solid fa-phone"></i> <input type="text" id="phoneship" required>
            </div>
            <div class="conto">
                <h3 class="h3city">City :</h3>
                <input type="text" id="cityship" required>
            </div>
            <div>
                <button class="navbtn" type="submit">Submit</button>
            </div>
        </form>
    </div>
</body>
<script>
    var crsr = document.querySelector("#cursor");
    var crsrblr = document.querySelector("#cursor-blur");
    document.addEventListener("mousemove", (dets) => {
        crsr.style.left = dets.x + 3 + "px";
        crsr.style.top = dets.y + 7 + "px";
        crsrblr.style.left = dets.x - 200 + "px";
        crsrblr.style.top = dets.y - 200 + "px";
    });

    class UserInfo {
        constructor(fullname, email, phone, city) {
            this.fullname = fullname;
            this.email = email;
            this.phone = phone;
            this.city = city;
        }
        get fullname() {
            return this._fullname;
        }
        set fullname(value) {
            if (value.length > 0 && value.trim() !== "") {
                this._fullname = value;
            } else {
                throw new Error("ERROR: Incorrect username!");
            }
        }
        get email() {
            return this._email;
        }
        set email(value) {
            if (/\S+@\S+\.\S+/.test(value)) {
                this._email = value;
            } else {
                throw new Error("ERROR: Invalid email address!");
            }
        }
        get phone() {
            return this._phone;
        }
        set phone(value) {
            if (/^\+?[0-9]{10,15}$/.test(value)) {
                this._phone = value;
            } else {
                throw new Error("ERROR: Invalid phone number!");
            }
        }
        get city() {
            return this._city;
        }
        set city(value) {
            if (value.trim() !== "") {
                this._city = value;
            } else {
                throw new Error("ERROR: City cannot be empty!");
            }
        }
    }

    class UserFormHandler {
        constructor(formID) {
            this.form = document.getElementById(formID);
            this.localStorageKey = "userInfo";

            // Attach the submit event listener
            this.form.addEventListener("submit", (e) => this.handleSubmit(e));
        }

        handleSubmit(e) {
            e.preventDefault();

            // Gather input values
            const fullname = document.getElementById("fullnameship").value;
            const number = document.getElementById("phoneship").value;
            const city = document.getElementById("cityship").value;
            const email = document.getElementById("emailship").value;

            try {
                // Create and validate user
                const user = new UserInfo(fullname, email, number, city);

                // Save user if validation passes
                this.saveUser(user);
            } catch (error) {
                alert(error.message); // Show validation error
            }
        }

        saveUser(user) {
            // Retrieve existing users from localStorage
            const users = JSON.parse(localStorage.getItem(this.localStorageKey)) || [];
            users.push(user);

            // Save updated users list back to localStorage
            localStorage.setItem(this.localStorageKey, JSON.stringify(users));

            alert("User saved!");

            // Redirect to booking page
            window.location.href = 'bookingpage.html';
        }
    }

    // Instantiate the form handler
    const data = new UserFormHandler("data");
</script>
</html>
