<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Gateway</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
    <style>
        body {
            font-family: "Montserrat", sans-serif;
    margin: 0;
    padding: 0;
    background-color: #f9f9f9;
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 250px;
}

.container {
    display: flex;
    justify-content: center;
    text-align: center;
    margin-top: 80px;
    flex-direction: column;
}

.form {
    border: 1px solid #ccc;
    padding: 10px;
    width: 300px;
    background-color: #fff;
    box-shadow: 10px 15px 10px rgba(0, 0, 0, 0.1);
    border-radius: 8px;
    margin-top: 10px;
}
#paymentform{
    margin-top: 66px;
}
.carddetails {
    display: flex;
    justify-content: center;
    text-align: center;
    align-items: center;
}

#paymentform h4 {
    text-align: start;
    margin: 12px;
    margin-left: 47px;
}

#paymentform input {
    border: 1px solid black;
    width: 270px;
    height: 30px;
    border-radius: 1px;
    outline: none;
    margin-bottom: 12px;
}

.paywithcard {
    margin: 10px;
}

.paywithcard button {
    border: none;
    background-color: rgb(253, 253, 49);
    width: 230px;
    height: 30px;
    cursor: pointer;
}

.paymentstatus {
    width: 100%;
    height: 100%;
    position: fixed;
    background-color: rgba(0, 0, 0, 0.7);
    justify-content: center;
    align-items: center;
    top: 0;
    left: 0;
    display: none;
}

.Innertext {
    width: 300px;
    height: 200px;
    background-color: #fff;
    text-align: center;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    gap: 12px;
    border-radius: 8px;
}

.Innertext button {
    background-color: #ccc;
    padding: 5px 10px;
    border: none;
    cursor: pointer;
    border-radius: 4px;
}

h3 {
    margin: 0;
}
.pcards{
    height: 180px;
    width: 280px;

}
.cont{
    display: flex;
    flex-direction: column;
    margin-top: 40px;
}
.cont1, .cont2{
    display: flex;
}
    </style>
</head>
<body>
    <h1 style="position: absolute; top: 22px; font-size: 2.8rem;">Payment Gateway</h1>
<div class="cont">
    <h1 style="margin: auto;">Cards Accepted :</h1>
    <div class="cont1">
    <img src="https://cdn.prod.website-files.com/5ee732bebd9839b494ff27cd/5ee732bebd98395aa0ff2815_paypal-logo-preview.webp" alt="" class="pcards">
    <img src="https://img.icons8.com/?size=512&id=13607&format=png" alt="" class="pcards">
</div>
<div class="cont2">
    <img src="https://static.vecteezy.com/system/resources/thumbnails/020/975/570/small_2x/visa-logo-visa-icon-transparent-free-png.png" alt="" class="pcards">
    <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTgc9xW_t712-TgFMwJxWxmgiKfTiPjrazjjg&s" alt="" class="pcards">
</div>
</div>
    <div class="container">
        <div class="carddetails">
            <form id="paymentform">
                <h1>Card Payment Details</h1>
                <h4 class="cartholder">Cardholder's Name :</h4>
                <input type="text" name="cardname" required id="cardholder">
                <h4>Card Number :</h4>
                <input type="text" maxlength="16" required id="cardnumber">
                <h4>Expiry Date (MM/YY) :</h4>
                <input type="text" maxlength="5" required id="expirydate">
                <h4>CVV :</h4>
                <input type="text" maxlength="3" id="cvv" required>
                <h4>Amount To Pay :</h4>
                <input type="text" id="amounttopay" readonly>
                <div class="paywithcard">
                    <button type="submit">Pay with Card</button>
                </div>
            </form>
        </div>
    </div>

    <div class="paymentstatus">
        <div class="Innertext"></div>
    </div>

    <script>
        // PaymentProcessor Class
class PaymentProcessor {
    constructor(formId, statusClass, innerTextClass) {
        this.paymentForm = document.getElementById(formId);
        this.paymentStatus = document.querySelector(statusClass);
        this.innerText = document.querySelector(innerTextClass);

        this.initialize();
    }

    // Initialize event listeners
    initialize() {
        var amount = 0;
var data = JSON.parse(localStorage.getItem("userBooking")) || [];
var ticket = data[data.length - 1]; // Get the last booking entry

    amount = ticket.tickets * 1000; // Use ticket.tickets instead of data.tickets
    console.log(amount);
        
        document.getElementById("amounttopay").value=amount;
        this.paymentForm.addEventListener("submit", (e) => {
            e.preventDefault();
            this.processPayment();
        });
    }

    // Process payment
    processPayment() {
        const cardHolder = document.getElementById("cardholder").value;
        const cardNumber = document.getElementById("cardnumber").value;
        const expiryDate = document.getElementById("expirydate").value;
        const cvv = document.getElementById("cvv").value;

        const validationMessage = this.validateForm(cardNumber, expiryDate, cvv);
        if (validationMessage) {
            alert(validationMessage);
            return;
        }

        this.showProcessing();

        setTimeout(() => {
            const paymentSuccess = Math.random() > 0.3;
            paymentSuccess ? this.showSuccessMessage() : this.showFailureMessage();
        }, 2000);
    }

    // Validate form inputs
    validateForm(cardNumber, expiryDate, cvv) {
        const cardNumberRegex = /^[0-9]{16}$/;
        const expiryDateRegex = /^(0[1-9]|1[0-2])\/([0-9]{2})$/;
        const cvvRegex = /^[0-9]{3}$/;

        if (!cardNumberRegex.test(cardNumber)) {
            return "Invalid card number. Must be 16 digits.";
        }
        if (!expiryDateRegex.test(expiryDate)) {
            return "Invalid expiry date. Format should be MM/YY.";
        }
        if (!cvvRegex.test(cvv)) {
            return "Invalid CVV. Must be 3 digits.";
        }

        return "";
    }

    // Show processing status
    showProcessing() {
        this.paymentStatus.style.display = "flex";
        this.innerText.innerHTML = `<h2>Payment Processing...</h2>`;
    }

    // Show success message
    showSuccessMessage() {
        this.innerText.innerHTML = `
            <h3 style="color:green;">Payment Received Successfully</h3>
            <h3 style="color:#007BFF">Seat Confirmed</h3>
            
            <button onclick="PaymentProcessor.logout()">Get ticket receipt</button>
        `;
    }

    // Show failure message
    showFailureMessage() {
        this.innerText.innerHTML = `
            <h3 style="color:red;">Payment Failed</h3>
            <button class="tryagain" onclick="paymentProcessor.tryAgain()">Try Again</button>
        `;
    }

    // Hide status and try again
    tryAgain() {
        this.paymentStatus.style.display = "none";
    }

    // Static method for logging out
    static logout() {
        window.location.href = "receipt.html";
    }
}

// Instantiate PaymentProcessor
const paymentProcessor = new PaymentProcessor("paymentform", ".paymentstatus", ".Innertext");

    </script>
</body>
</html>
