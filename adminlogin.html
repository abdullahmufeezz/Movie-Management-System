<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            background: url('cinemabg.jpg');
            background-position: center center;
            background-repeat: no-repeat;
            background-size: max(1400px, 100vw);
            color: white;
            font-family: "Montserrat", sans-serif;
        }

        form {
            padding: 20px;
            width: 300px;
            height: 56vh;
            width: 62vw;
            position: relative;
            z-index: 11;
            display: flex;
            justify-content: flex-end;
            align-items: center;
            flex-direction: column;
            gap: 15px;
        }

        .cinema {
            height: 77vh;
            width: 55vw;
            border-radius: 10px;
            border: 2px solid rgb(117, 5, 5);
            background-color: rgba(0, 0, 0, 0.598);
            position: relative;
            z-index: 11;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            box-shadow: 2px 2px 10px red, -2px -2px 10px red, -2px -2px 10px red, -2px -2px 10px red;
        }

        #cursor {
            height: 15px;
            width: 15px;
            background-color: red;
            border-radius: 50%;
            position: fixed;
            z-index: 99;
            transition: all linear 0.13s;
        }

        #cursor-blur {
            height: 400px;
            width: 400px;
            background-color: #cf1e1e57;
            border-radius: 50%;
            position: fixed;
            filter: blur(70px);
            z-index: 9;
            transition: all linear 0.4s;
        }

        body::-webkit-scrollbar {
            background-color: rgb(46, 0, 0);
            display: block;
            width: 10px;
        }

        body::-webkit-scrollbar-thumb {
            border-radius: 50px;
            background: linear-gradient(red, rgb(84, 8, 8));
        }

        *::selection {
            color: red;
            background-color: white;
        }

        .logo {
            height: 130px;
            width: 160px;
            margin-left: 30px;
            margin-top: 20px;
            transition: all ease-in-out 0.4s;
            position: relative;
            z-index: 11;
        }
        .logo:hover{
            cursor: pointer;
            filter: drop-shadow(0px 7px 20px red);
        }
        .showinghead {
            font-size: 2.8rem;
            margin: 0;
            font-weight: 900;
            text-shadow:
                0 0 10px red,
                0 0 20px red,
                0 0 40px red,
                0 0 80px red;
        }

        .showheadline {
            bottom: 0;
            width: 100%;
            height: 4px;
            background-color: red;
        }

        .showheadcont {
            position: relative;
            z-index: 11;
            width: 520px;
            margin: auto;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            margin: auto;
        }

        .navbtn {
            height: 45px;
            width: 150px;
            border-radius: 50px;
            color: white;
            border: 3px solid rgb(100, 0, 0);
            font-size: 1.1rem;
            background: linear-gradient(to left bottom, red, rgb(84, 8, 8));
            transition: all ease-in-out 0.3s;
            position: relative;
            z-index: 11;
            font-family: "Montserrat", sans-serif;
        }

        .navbtn:hover {
            font-size: 1rem;
            background: linear-gradient(to left bottom, rgb(84, 8, 8), red);
            cursor: pointer;
        }

        .shiph2 {
            text-align: center;
            position: relative;
            z-index: 11;
        }
 input {
    display: block;
  margin: 5px 0;
  padding: 10px;
  outline: none;
    border: 3px solid red;
    background-color: rgba(195, 21, 21, 0.455);
    color: white;
    font-size: 0.93rem;
    margin-left: 20px;
    border-radius: 10px;
        }
        .number i {
            margin-left: 12px;
        }
        .conto {
            display: flex;
        }
        h3{
            font-weight: 500;
        }
        #password{
            margin-right: 42px;
        }
    </style>
</head>

<body>
    <div id="cursor"></div>
    <div id="cursor-blur"></div>
    <div class="cinema">
        <img onclick="location.href='mainpage.html'" class="logo ancr" src="logo-dark.png" alt="image not available">
        <form id="login-form">
            <div class="showheadcont">
                <h1 class="showinghead">ADMIN PANEL LOGIN</h1>
                <div class="showheadline"></div>
            </div>
            <div class="conto">
                <h3 class="h3fullname">Username :</h3>
                <input id="username" type="text" required>
            </div>
            <div class="conto">
                <h3 class="h3email" style="margin-left: 45px;">Password :</h3>
                <input type="password" id="password" required>
            </div>
            <div>
                <button class="navbtn">Log In</button>
            </div>
        </form>
    </div>
</body>
<script>
    var crsr = document.querySelector("#cursor");
    var crsrblr = document.querySelector("#cursor-blur");
    document.addEventListener("mousemove", (dets) => {
        crsr.style.left = dets.x + 3 + "px";
        crsr.style.top = dets.y + 7 + "px";
        crsrblr.style.left = dets.x - 200 + "px";
        crsrblr.style.top = dets.y - 200 + "px";
    });

    let form=document.getElementById("login-form");
    let btn = document.querySelector(".navbtn");
    let id = "admin2275";
    let pass = "admin56";

    form.addEventListener("submit", (event) => {
        event.preventDefault();
        
        let username = document.querySelector("#username").value; //taking input 
        let password = document.querySelector("#password").value; //taking input

        if (!username || !password) {
            alert("Please fill in both username and password.");
            form.reset();
            return;
        }

        if (username === id && password === pass) {
            alert("Login successful!");
            form.reset();
            window.location.href="adminpage.html";
        } 
        else {
            alert("Incorrect username or password.");
            form.reset();
        }
    });
</script>
</html>
